name: test - CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

env:
  ZOLA_VERSION: v0.22.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - name: Download zola
        run: |
          ARCHIVE="zola-${{ env.ZOLA_VERSION }}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "https://github.com/getzola/zola/releases/download/${{ env.ZOLA_VERSION }}/${ARCHIVE}" -o /tmp/zola.tar.gz
          curl -fsSL "https://github.com/getzola/zola/releases/download/${{ env.ZOLA_VERSION }}/sha256sums.txt" \
            | grep "${ARCHIVE}" \
            | awk '{print $1"  /tmp/zola.tar.gz"}' \
            | sha256sum -c -
          sudo tar xzf /tmp/zola.tar.gz -C /usr/local/bin
      - name: Check site
        run: zola check
