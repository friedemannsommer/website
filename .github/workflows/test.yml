name: test - CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

env:
  ZOLA_VERSION: v0.22.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Download zola
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="zola-${{ env.ZOLA_VERSION }}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "https://github.com/getzola/zola/releases/download/${{ env.ZOLA_VERSION }}/${ARCHIVE}" -o /tmp/zola.tar.gz
          gh attestation verify /tmp/zola.tar.gz --owner getzola
          sudo tar xzf /tmp/zola.tar.gz -C /usr/local/bin
      - name: Check site
        run: zola check
