name: public - CI

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'sass/**'
      - 'static/**'
      - 'templates/**'
      - 'config.toml'
      - '.github/workflows/publish.yml'

env:
  ZOLA_VERSION: v0.22.1

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download zola
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="zola-${{ env.ZOLA_VERSION }}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "https://github.com/getzola/zola/releases/download/${{ env.ZOLA_VERSION }}/${ARCHIVE}" -o /tmp/zola.tar.gz
          gh attestation verify /tmp/zola.tar.gz --owner getzola
          sudo tar xzf /tmp/zola.tar.gz -C /usr/local/bin
      - name: Build site
        run: zola build -o public
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: public
